<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrieve Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@0,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/retrieve_password.css">
    <link rel="icon" href="../images/meditrack-logo.png">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth-guard.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="title">Retrieve Forgotten Password</h1>
         <!-- Authentication engineers will handle this -->
        <form id="retrieveForm">
        
            <label for="staffId" class="staff-id">Staff ID</label>
            <br>
            <input id="staffId" type="text" name="staffId" required placeholder="Enter staff ID" class="id-input">
            <br>
 
            <label for="email" class="email-label">Email</label>
            <br>
            <input id="email" name="email" type="email" required placeholder="name@gmail.com" class="email-input">
            <br>
 
            <label for="phone" class="contact-label">Phone Number</label>
            <br>
            <input id="phone" name="phone" type="tel" required placeholder="+233545123456" class="contact-input">
            <br>
        
            
            <p class="mode-label">Select Mode of Retrieval </p>
            <div class="retrieval-mode-sms">
                <input id="sms-retrieval" name="retrievalMode" type="checkbox" value="sms">
                <label for="sms-retrieval" style="margin: 3px;" >SMS</label>
            </div>
            <div class="retrieval-mode-email">
                <input type="checkbox" name="retrievalMode" id="email-retrieval" value="email">
                <label for="email-retrieval" style="margin: 3px;" >E-mail</label>
                <br>
            </div>
 
                <button type="submit" class="button">Submit</button>
            </div>
        </form>
    </div>
    
    <script src="../js/Scripting.js"></script>
</body>
</html>
