<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@0,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/login.css">
    <title>Login</title>
    <link rel="icon" href="images/meditrack-logo.png">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth-guard.js"></script>
</head>
<body>
    
    <div class="login-container">
        <h1 class="head">Staff Login</h1>
        <form id="loginForm" action="/login" method="post">

            <label for="ID" class="id">Staff ID</label>
            <br>
            <input id="ID" name="staffId" type="text" required placeholder="Enter your staff ID" class="input1">
            <br>

            <label for="Password" class="password">Password</label>
            <br>
            <input id="Password" name="password" type="password" required placeholder="Enter your password" class="input2">
            <br>

            <a href="screens/retrieve_password.html" class="forgot-pw">Forgot Password?</a>
            <br>

            <button type="submit" class="submit-button">Login</button>

        </form>
    </div>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/Scripting.js"></script>
</body>
</html>
