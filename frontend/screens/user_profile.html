<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack - User Profile</title>
    <link rel="stylesheet" href="../styles/user_profile.css">
    <link rel="stylesheet" href="../styles/sidebar-transitions.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@0,100..900&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="icon" href="../images/meditrack-logo.png">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth-guard.js"></script>
</head>
<body>

    <div class="app-container">
       <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo-area">
                 <img src="../images/retrigency-logo.png" alt="MediTrack logo" class="logo-img">
            </div>
            <ul class="nav-links">
                <div class="sidebar-links">
                    <li>
                        <a href="dashboard.html">
                            <i class="fa-solid fa-chart-line"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>

                    <li>
                        <a href="patients_data.html">
                            <i class="fa-solid fa-user-injured"></i>
                            <span>Patients Data</span>
                        </a>
                    </li>

                    <li>
                        <a href="face_id.html">
                            <i class="fa-solid fa-camera"></i>
                            <span>Face Identification</span>
                        </a>
                    </li>

                    <li>
                        <a href="help.html">
                            <i class="fa-solid fa-circle-question"></i>
                            <span>Help</span>
                        </a>
                    </li>

                    <li>
                        <a href="settings.html">
                            <i class="fa-solid fa-gear"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                </div>
                <div class="sidebar-logout">
                    <li class="logout">
                        <a href="login_page.html">
                            <i class="fa-solid fa-right-from-bracket"></i>
                            <span>Logout</span>
                        </a>
                    </li>
                </div>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-nav">
                <div class="top-nav-text">
                    <span>User Profile</span>
                </div>
                <div class="top-nav-icons">
                    <a href="#"><i class="bi bi-bell"></i></a>
                    <a href="user_profile.html"><i class="bi bi-person"></i>Staff</a>
                </div> 
            </header>

            <div class="content-wrapper">
                <div class="profile-card">
                    <h1 class="heading">My profile</h1>
                    <div class="image"><img src="../images/meditrack-logo.png" class="profile-image" alt="Profile image"></div>
                    <div class="text-data">
                        <div class="profile-field">
                            <span class="name">Full Name:</span>
                            <span class="name-text" id="full-name-display">--</span>
                        </div>
                        <div class="profile-field">
                            <span class="email">Email Address:</span>
                            <span class="email-text" id="email-display">--</span>
                        </div>
                        <div class="profile-field">
                            <span class="id">Staff ID:</span>
                            <span class="id-text" id="staff-id-display">--</span>
                        </div>
                        <div class="profile-field">
                            <span class="dept">Department:</span>
                            <span class="dept-text" id="dept-display">--</span>
                        </div>
                    </div>
                    <div class="profile-actions mt-4">
                        <button class="btn btn-primary me-2" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                            <i class="bi bi-pencil-square me-1"></i> Edit Profile
                        </button>
                        <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#settingsModal">
                            <i class="bi bi-gear me-1"></i> Settings
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editProfileModalLabel">Edit Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editProfileForm">
                        <div class="mb-3">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstName" required>
                        </div>
                        <div class="mb-3">
                            <label for="middleName" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="middleName">
                        </div>
                        <div class="mb-3">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastName" required>
                        </div>
                        <div class="mb-3">
                            <label for="departmentId" class="form-label">Department ID</label>
                            <input type="number" class="form-control" id="departmentId">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveProfileBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="settingsModalLabel">User Settings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="settingsForm">
                        <div class="mb-3">
                            <label for="theme" class="form-label">Theme</label>
                            <select class="form-select" id="theme">
                                <option value="light">Light</option>
                                <option value="dark">Dark</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="language" class="form-label">Language</label>
                            <select class="form-select" id="language">
                                <option value="english">English</option>
                                <option value="french">French</option>
                                <option value="spanish">Spanish</option>
                                <option value="german">German</option>
                            </select>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="emailNotification">
                            <label class="form-check-label" for="emailNotification">Email Notifications</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="pushNotification">
                            <label class="form-check-label" for="pushNotification">Push Notifications</label>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="smsNotification">
                            <label class="form-check-label" for="smsNotification">SMS Notifications</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/Scripting.js"></script>
    <script src="../js/user_profile.js"></script>
</body>
</html>
